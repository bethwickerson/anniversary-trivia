<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Peter &amp; Marilyn Wickerson · 60th Anniversary Trivia</title>
<style>
  :root{
    --bg:#0d2438;
    --bg2:#123a54;
    --gold:#e8c477;
    --gold-soft:#f3e2b8;
    --cream:#fdf6e8;
    --ink:#0b1c2c;
    --sixties:#ff8f6b;   /* coral */
    --baseball:#7fd68a;  /* green */
    --greek:#8ec7ff;     /* blue */
    --photo:#e8c477;     /* gold */
    --shadow:rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Georgia","Times New Roman",serif;
    background:radial-gradient(circle at 50% 20%, var(--bg2), var(--bg) 70%);
    color:var(--cream);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #stage{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:min(6vh,64px) min(6vw,80px);
  }

  /* ---- decorative frame ---- */
  #stage::before{
    content:"";
    position:fixed;
    inset:min(2.5vh,22px) min(2.5vw,22px);
    border:2px solid rgba(232,196,119,.35);
    border-radius:18px;
    pointer-events:none;
  }

  .card{
    width:100%;
    max-width:1400px;
    text-align:center;
    animation:fade .6s ease both;
  }
  @keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* ---- top bar ---- */
  #topbar{
    position:fixed;
    top:min(4vh,34px);
    left:0;right:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 min(6vw,80px);
    font-size:clamp(13px,1.5vw,20px);
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--gold);
    z-index:5;
    pointer-events:none;
  }
  #topbar .names{font-variant:small-caps;letter-spacing:.2em}
  #progress-wrap{
    position:fixed;bottom:min(4.2vh,36px);left:0;right:0;
    display:flex;justify-content:center;gap:0;z-index:5;pointer-events:none;
  }
  #progress{
    height:6px;width:min(60vw,760px);
    background:rgba(255,255,255,.12);
    border-radius:99px;overflow:hidden;
  }
  #progress-fill{height:100%;width:0;background:var(--gold);border-radius:99px}

  /* ---- category badge ---- */
  .badge{
    display:inline-block;
    padding:.5em 1.4em;
    border-radius:99px;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-weight:700;
    font-size:clamp(14px,1.7vw,24px);
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--ink);
    margin-bottom:clamp(20px,3.4vh,46px);
    box-shadow:0 8px 26px var(--shadow);
  }
  .badge.sixties{background:var(--sixties)}
  .badge.baseball{background:var(--baseball)}
  .badge.greek{background:var(--greek)}

  .qnum{
    display:block;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:clamp(12px,1.4vw,18px);
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--gold);
    opacity:.85;
    margin-bottom:clamp(14px,2.2vh,26px);
  }

  .question{
    font-size:clamp(30px,5.2vw,74px);
    line-height:1.18;
    font-weight:700;
    text-shadow:0 3px 18px var(--shadow);
  }

  .answer-label{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:clamp(14px,1.7vw,24px);
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:clamp(16px,2.6vh,30px);
  }
  .answer{
    font-size:clamp(34px,6vw,88px);
    line-height:1.14;
    font-weight:700;
    color:var(--gold-soft);
    text-shadow:0 3px 22px var(--shadow);
  }
  .fact{
    margin-top:clamp(20px,3.4vh,42px);
    font-size:clamp(18px,2.3vw,32px);
    line-height:1.4;
    font-style:italic;
    color:var(--cream);
    opacity:.9;
    max-width:26em;
    margin-left:auto;margin-right:auto;
  }

  /* ---- think timer ring ---- */
  #think{
    margin-top:clamp(28px,5vh,64px);
    display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .ring{transform:rotate(-90deg)}
  .ring .track{stroke:rgba(255,255,255,.14)}
  .ring .bar{stroke:var(--gold);stroke-linecap:round;transition:stroke-dashoffset .25s linear}
  #think .hint{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:clamp(13px,1.6vw,20px);
    letter-spacing:.14em;text-transform:uppercase;color:var(--gold);opacity:.85;
  }

  /* ---- photo slide ---- */
  .photo-card{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(16px,3vh,34px)}
  .photo-frame{
    background:var(--cream);
    padding:clamp(10px,1.4vw,20px);
    border-radius:6px;
    box-shadow:0 24px 60px var(--shadow);
    max-width:min(84vw,1200px);
    max-height:64vh;
    transform:rotate(-1.2deg);
  }
  .photo-frame img{
    display:block;
    max-width:100%;
    max-height:58vh;
    border-radius:2px;
    object-fit:contain;
  }
  .photo-caption{
    font-style:italic;
    font-size:clamp(20px,2.6vw,38px);
    color:var(--gold-soft);
    text-shadow:0 2px 14px var(--shadow);
  }
  .photo-placeholder{
    width:min(70vw,900px);height:48vh;
    display:flex;align-items:center;justify-content:center;text-align:center;
    background:repeating-linear-gradient(45deg,rgba(255,255,255,.05),rgba(255,255,255,.05) 18px,rgba(255,255,255,.09) 18px,rgba(255,255,255,.09) 36px);
    border:2px dashed rgba(232,196,119,.5);border-radius:8px;
    color:var(--gold);font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:clamp(16px,2vw,26px);letter-spacing:.05em;padding:2em;
  }

  /* ---- title & end screens ---- */
  .hero .kicker{
    font-family:"Helvetica Neue",Arial,sans-serif;
    letter-spacing:.4em;text-transform:uppercase;color:var(--gold);
    font-size:clamp(14px,1.8vw,24px);margin-bottom:clamp(18px,3vh,34px);
  }
  .hero h1{
    font-size:clamp(42px,7.5vw,120px);line-height:1.02;font-weight:700;
    text-shadow:0 4px 26px var(--shadow);
  }
  .hero .amp{color:var(--gold);font-style:italic}
  .hero .sub{
    margin-top:clamp(20px,3.4vh,40px);
    font-size:clamp(20px,2.8vw,40px);font-style:italic;color:var(--gold-soft);
  }
  .hero .years{
    margin-top:clamp(24px,4vh,52px);
    font-family:"Helvetica Neue",Arial,sans-serif;font-weight:700;
    font-size:clamp(56px,11vw,180px);color:var(--gold);
    letter-spacing:.02em;line-height:1;text-shadow:0 6px 30px var(--shadow);
  }
  .startbtn{
    margin-top:clamp(30px,5vh,60px);
    display:inline-block;cursor:pointer;
    font-family:"Helvetica Neue",Arial,sans-serif;font-weight:700;
    font-size:clamp(18px,2.2vw,30px);letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink);background:var(--gold);
    border:none;border-radius:99px;padding:.7em 2.4em;
    box-shadow:0 12px 30px var(--shadow);transition:transform .15s ease,box-shadow .15s ease;
  }
  .startbtn:hover{transform:translateY(-2px);box-shadow:0 16px 40px var(--shadow)}
  .controls-hint{
    margin-top:clamp(26px,4vh,44px);
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:clamp(12px,1.4vw,17px);letter-spacing:.06em;color:var(--cream);opacity:.7;
    line-height:1.9;
  }
  .controls-hint kbd{
    background:rgba(255,255,255,.14);border-radius:5px;padding:.15em .55em;
    font-family:inherit;border:1px solid rgba(255,255,255,.18);
  }

  /* ---- pause overlay ---- */
  #pause{
    position:fixed;inset:0;z-index:20;display:none;
    align-items:center;justify-content:center;
    background:rgba(9,22,36,.72);backdrop-filter:blur(3px);
    font-family:"Helvetica Neue",Arial,sans-serif;
    letter-spacing:.2em;text-transform:uppercase;color:var(--gold);
    font-size:clamp(22px,3.4vw,52px);
  }
  body.paused #pause{display:flex}

  #toast{
    position:fixed;bottom:min(9vh,90px);left:50%;transform:translateX(-50%);
    background:rgba(9,22,36,.9);border:1px solid rgba(232,196,119,.4);
    color:var(--cream);font-family:"Helvetica Neue",Arial,sans-serif;
    padding:.6em 1.3em;border-radius:99px;font-size:clamp(12px,1.4vw,18px);
    letter-spacing:.08em;opacity:0;transition:opacity .3s ease;z-index:30;pointer-events:none;
  }
  #toast.show{opacity:1}

  .hidden{display:none!important}
</style>
</head>
<body>

  <div id="topbar" class="hidden">
    <span class="names">Peter &amp; Marilyn · 60 Years</span>
    <span id="counter"></span>
  </div>

  <div id="stage"><!-- slides render here --></div>

  <div id="progress-wrap" class="hidden"><div id="progress"><div id="progress-fill"></div></div></div>

  <div id="pause">Paused &middot; press Space to resume</div>
  <div id="toast"></div>

<script src="photos.js"></script>
<script>
/* ============================================================
   Peter & Marilyn Wickerson · 60th Anniversary Trivia
   Self-contained, auto-playing, projector-friendly.
   ============================================================ */

const CONFIG = {
  thinkSeconds:  20,   // time to think about each question
  answerSeconds:  9,   // time the answer stays on screen
  photoSeconds:   8,   // time each family photo stays on screen
  titleAutostart: 0,   // 0 = wait for Start click; >0 = auto-start after N seconds
};

/* ---- Questions ------------------------------------------------
   category: 'sixties' | 'baseball' | 'greek'
   fact is optional colour for the answer screen.
----------------------------------------------------------------*/
const QUESTIONS = [
  // ---------- The Swinging Sixties (Canadian slant) ----------
  {c:'sixties', q:"In 1966 Peter and Marilyn were married. Which country hosted (and won) the FIFA World Cup that same year?", a:"England", f:"England beat West Germany 4 to 2 at Wembley."},
  {c:'sixties', q:"What year did Canada raise its new red-and-white maple leaf flag for the very first time?", a:"1965", f:"It was first raised on February 15, 1965."},
  {c:'sixties', q:"Which Canadian city hosted the world's fair known as Expo 67?", a:"Montreal", f:"It was the highlight of Canada's Centennial year."},
  {c:'sixties', q:"What was Canada celebrating in 1967 with fireworks, festivals and Expo?", a:"Its 100th birthday (the Centennial)", f:"Canada turned 100 in 1967."},
  {c:'sixties', q:"Four young musicians from Liverpool took the world by storm in the 1960s. Name the band.", a:"The Beatles"},
  {c:'sixties', q:"In July 1969, who became the first person to walk on the Moon?", a:"Neil Armstrong", f:"\"One small step for man…\""},
  {c:'sixties', q:"Who became Prime Minister of Canada in 1968, sparking a wave of \"Trudeaumania\"?", a:"Pierre Trudeau"},
  {c:'sixties', q:"Which 1960s dance craze had everyone twisting their hips on the dance floor?", a:"The Twist"},
  {c:'sixties', q:"What small, rounded Volkswagen car was everywhere in the 1960s?", a:"The Beetle (the \"Bug\")"},
  {c:'sixties', q:"On Saturday nights, Canadian families gathered around the TV for which long-running hockey broadcast?", a:"Hockey Night in Canada"},
  {c:'sixties', q:"Which team won the Stanley Cup in 1967 and (to Canada's dismay) hasn't won one since?", a:"The Toronto Maple Leafs"},
  {c:'sixties', q:"What colour was the submarine in the Beatles' famous 1968 song and film?", a:"Yellow", f:"\"We all live in a yellow submarine.\""},
  {c:'sixties', q:"Which U.S. president was assassinated in Dallas in November 1963?", a:"John F. Kennedy"},
  {c:'sixties', q:"The famous 1969 music festival on a farm in New York was called…?", a:"Woodstock"},
  {c:'sixties', q:"Which short skirt became the daring fashion statement of the 1960s?", a:"The miniskirt"},
  {c:'sixties', q:"What sporty Ford car, launched in 1964, became a 1960s icon?", a:"The Ford Mustang"},
  {c:'sixties', q:"Which Canadian singer-songwriter wrote the classic \"Both Sides Now\"?", a:"Joni Mitchell"},
  {c:'sixties', q:"Which gentle CBC children's host opened his Tickle Trunk beginning in 1967?", a:"Mr. Dressup (Ernie Coombs)"},

  // ---------- Take Me Out to the Ball Game ----------
  {c:'baseball', q:"How many players from the fielding team are on the field at once?", a:"Nine"},
  {c:'baseball', q:"How many strikes does it take to strike a batter out?", a:"Three"},
  {c:'baseball', q:"What do you call it when a batter hits the ball and circles all the bases in one go, usually over the fence?", a:"A home run"},
  {c:'baseball', q:"In 1969 a Canadian city got its first Major League Baseball team, the Expos. Which city?", a:"Montreal"},
  {c:'baseball', q:"Four balls from the pitcher sends the batter to first base. What is this called?", a:"A walk (base on balls)"},
  {c:'baseball', q:"How many bases must a runner touch to score a run?", a:"Four", f:"First, second, third and home."},
  {c:'baseball', q:"Which New York Yankees legend was nicknamed \"The Sultan of Swat\"?", a:"Babe Ruth"},
  {c:'baseball', q:"How many innings are there in a standard Major League Baseball game?", a:"Nine"},
  {c:'baseball', q:"What is the name of the player who throws the ball toward the batter?", a:"The pitcher"},
  {c:'baseball', q:"Which Canadian team won back-to-back World Series in 1992 and 1993?", a:"The Toronto Blue Jays"},
  {c:'baseball', q:"What do we call the diamond-shaped area a batter must run around?", a:"The bases (the infield / diamond)"},
  {c:'baseball', q:"In 1974, Hank Aaron broke whose famous career home-run record?", a:"Babe Ruth's"},

  // ---------- A Little Ancient Greece ----------
  {c:'greek', q:"What is the name of the famous temple atop the Acropolis in Athens, dedicated to the goddess Athena?", a:"The Parthenon"},
  {c:'greek', q:"Which ancient Greek city was famous for its tough, fearless warriors?", a:"Sparta"},
  {c:'greek', q:"The ancient Olympic Games were held in honour of which king of the gods?", a:"Zeus"},
  {c:'greek', q:"Which Greek hero was invincible everywhere except for his heel?", a:"Achilles"},
  {c:'greek', q:"Which philosopher, teacher of Plato, was famously made to drink hemlock?", a:"Socrates"},
  {c:'greek', q:"What giant wooden animal did the Greeks use to sneak into the city of Troy?", a:"The Trojan Horse"},
  {c:'greek', q:"Democracy, rule by the people, was born in which ancient Greek city?", a:"Athens"},
  {c:'greek', q:"Which one-eyed giant does clever Odysseus outwit in Homer's Odyssey?", a:"The Cyclops (Polyphemus)"},
  {c:'greek', q:"Who was the Greek goddess of love and beauty?", a:"Aphrodite"},
  {c:'greek', q:"Alexander the Great came from which northern Greek kingdom?", a:"Macedonia (Macedon)"},
];

const CAT_LABEL = {
  sixties:  "The Swinging Sixties",
  baseball: "Take Me Out to the Ball Game",
  greek:    "A Little Ancient Greece",
};

/* ---- Photos --------------------------------------------------
   window.PHOTOS is defined in photos.js as an array of
   { file, caption }.  One photo is shown after each question.
   A photo that isn't in the photos/ folder is simply skipped.
----------------------------------------------------------------*/
const PHOTOS = (window.PHOTOS && window.PHOTOS.length) ? window.PHOTOS : [];

/* ---- Build the play sequence ---------------------------------
   Interleave family photos evenly between the Q&A pairs so the
   whole set of photos is spread across the game.
----------------------------------------------------------------*/
function buildSequence(){
  const seq = [];
  const nQ = QUESTIONS.length;
  // Show ONE family photo after each question (when one is listed for
  // that slot). Photo i follows question i, so list them in the order
  // you'd like them to appear. Extra photos beyond the number of
  // questions are not shown.
  for(let i=0;i<nQ;i++){
    seq.push({type:'question', data:QUESTIONS[i], index:i});
    seq.push({type:'answer',   data:QUESTIONS[i], index:i});
    if(i < PHOTOS.length){
      seq.push({type:'photo', data:PHOTOS[i], index:i});
    }
  }
  return seq;
}

/* ============================================================
   Player engine
   ============================================================ */
const stage      = document.getElementById('stage');
const topbar     = document.getElementById('topbar');
const counterEl  = document.getElementById('counter');
const progWrap   = document.getElementById('progress-wrap');
const progFill   = document.getElementById('progress-fill');
const toastEl    = document.getElementById('toast');

let SEQUENCE = [];
let pos = -1;            // index into SEQUENCE (-1 = title)
let paused = false;
let timer = null;        // setTimeout handle for auto-advance
let ringRAF = null;      // requestAnimationFrame for countdown ring
let slotStart = 0;       // when current slot began (performance.now)
let slotDuration = 0;    // ms for current slot
let slotRemaining = 0;   // ms left when paused

const totalQuestions = QUESTIONS.length;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ---------- Screen renderers ---------- */
function renderTitle(){
  topbar.classList.add('hidden');
  progWrap.classList.add('hidden');
  stage.innerHTML = `
    <div class="card hero">
      <div class="kicker">A Family Celebration</div>
      <h1>Peter <span class="amp">&amp;</span> Marilyn<br>Wickerson</h1>
      <div class="years">60</div>
      <div class="sub">Years of Marriage &middot; 1966 to 2026</div>
      <button class="startbtn" id="startbtn">Start the Trivia</button>
      <div class="controls-hint">
        Plays automatically &middot; <kbd>Space</kbd> pause/resume &nbsp; <kbd>&larr;</kbd>/<kbd>&rarr;</kbd> back/skip &nbsp; <kbd>A</kbd> reveal answer &nbsp; <kbd>F</kbd> full screen &nbsp; <kbd>R</kbd> restart
      </div>
    </div>`;
  document.getElementById('startbtn').addEventListener('click', start);
}

function renderQuestion(item){
  topbar.classList.remove('hidden');
  progWrap.classList.remove('hidden');
  const {c,q} = item.data;
  counterEl.textContent = `Question ${item.index+1} of ${totalQuestions}`;
  stage.innerHTML = `
    <div class="card">
      <span class="badge ${c}">${esc(CAT_LABEL[c])}</span>
      <span class="qnum">Question ${item.index+1}</span>
      <div class="question">${esc(q)}</div>
      <div id="think">
        <svg class="ring" width="110" height="110" viewBox="0 0 110 110">
          <circle class="track" cx="55" cy="55" r="48" fill="none" stroke-width="8"/>
          <circle class="bar"   cx="55" cy="55" r="48" fill="none" stroke-width="8"
                  stroke-dasharray="301.6" stroke-dashoffset="0" id="ringbar"/>
        </svg>
        <div class="hint">Think…</div>
      </div>
    </div>`;
  startRing(CONFIG.thinkSeconds*1000);
}

function renderAnswer(item){
  const {c,a,f} = item.data;
  counterEl.textContent = `Question ${item.index+1} of ${totalQuestions}`;
  stage.innerHTML = `
    <div class="card">
      <span class="badge ${c}">${esc(CAT_LABEL[c])}</span>
      <div class="answer-label">The Answer</div>
      <div class="answer">${esc(a)}</div>
      ${f ? `<div class="fact">${esc(f)}</div>` : ``}
    </div>`;
}

/* The photo file to show. Photos live locally in the photos/ folder
   next to index.html, so it all runs offline with nothing to break. */
function photoSources(d){
  if(d.src)  return [d.src];
  if(d.file) return ['photos/' + d.file];
  return [];
}

function renderPhoto(item){
  topbar.classList.remove('hidden');
  const d = item.data;
  const caption = d.caption || '';
  const srcs = photoSources(d);
  counterEl.textContent = `A Family Memory`;
  const cap = caption ? `<div class="photo-caption">${esc(caption)}</div>` : '';
  stage.innerHTML = `
    <div class="card photo-card">
      <div class="photo-frame">
        <img id="pimg" alt="${esc(caption||'Wickerson family photo')}">
      </div>
      ${cap}
    </div>`;
  const img = document.getElementById('pimg');
  if(!srcs.length){ onPhotoFail(item); return; }
  let tryIdx = 0;
  img.onerror = () => {
    tryIdx++;
    if(tryIdx < srcs.length){ img.src = encodeURI(srcs[tryIdx]); }
    else { onPhotoFail(item); }
  };
  img.src = encodeURI(srcs[0]);
}

/* A photo couldn't be loaded from any source: skip it so the
   trivia keeps flowing (only skips while playing, not when paused). */
function onPhotoFail(item){
  if(!paused) show(pos+1);
}

function renderPlaceholderPhoto(n){
  topbar.classList.remove('hidden');
  counterEl.textContent = `A Family Memory`;
  stage.innerHTML = `
    <div class="card photo-card">
      <div class="photo-placeholder">
        Family photo #${n}<br><br>
        <small>Add photos in <b>photos.js</b> and they'll appear here between questions.</small>
      </div>
    </div>`;
}

function renderEnd(){
  topbar.classList.add('hidden');
  progWrap.classList.add('hidden');
  stage.innerHTML = `
    <div class="card hero">
      <div class="kicker">Thank you for playing</div>
      <h1>Happy 60<span class="amp">th</span><br>Anniversary!</h1>
      <div class="sub">Peter &amp; Marilyn Wickerson &middot; 1966 to 2026</div>
      <div class="controls-hint">Press <kbd>R</kbd> to play again</div>
    </div>`;
}

/* ---------- Countdown ring ---------- */
function startRing(ms){
  const bar = document.getElementById('ringbar');
  if(!bar) return;
  const circ = 2*Math.PI*48; // 301.6
  cancelAnimationFrame(ringRAF);
  const begin = performance.now();
  function frame(now){
    const elapsed = now - begin;
    const pct = Math.min(1, elapsed/ms);
    bar.style.strokeDashoffset = (circ*pct).toFixed(1);
    if(pct<1 && !paused) ringRAF = requestAnimationFrame(frame);
  }
  ringRAF = requestAnimationFrame(frame);
}

/* ---------- Sequencing ---------- */
function show(i){
  clearTimeout(timer);
  cancelAnimationFrame(ringRAF);
  pos = i;

  if(pos >= SEQUENCE.length){ renderEnd(); return; }

  const item = SEQUENCE[pos];
  let dur;
  if(item.type==='question'){ renderQuestion(item); dur = CONFIG.thinkSeconds*1000; }
  else if(item.type==='answer'){ renderAnswer(item); dur = CONFIG.answerSeconds*1000; }
  else { renderPhoto(item); dur = CONFIG.photoSeconds*1000; }

  updateProgress();
  scheduleAdvance(dur);
}

function scheduleAdvance(ms){
  slotDuration = ms;
  slotRemaining = ms;
  slotStart = performance.now();
  clearTimeout(timer);
  if(!paused){
    timer = setTimeout(()=>show(pos+1), ms);
  }
}

function updateProgress(){
  // progress based on how many questions have been reached
  const item = SEQUENCE[pos];
  let qDone = 0;
  for(let k=0;k<=pos;k++){ if(SEQUENCE[k] && SEQUENCE[k].type==='answer') qDone++; }
  progFill.style.width = (qDone/totalQuestions*100).toFixed(1)+'%';
}

/* ---------- Controls ---------- */
function start(){
  SEQUENCE = buildSequence();
  show(0);
}
function restart(){ pos=-1; paused=false; document.body.classList.remove('paused'); renderTitle(); }

function togglePause(){
  paused = !paused;
  document.body.classList.toggle('paused', paused);
  if(paused){
    clearTimeout(timer);
    cancelAnimationFrame(ringRAF);
    slotRemaining = slotDuration - (performance.now()-slotStart);
  }else{
    // resume
    slotStart = performance.now();
    slotDuration = Math.max(0, slotRemaining);
    timer = setTimeout(()=>show(pos+1), slotDuration);
    // resume the ring if on a question
    const item = SEQUENCE[pos];
    if(item && item.type==='question'){
      startRing(slotRemaining);
    }
  }
}

function next(){ if(pos<0){start();return;} show(Math.min(pos+1, SEQUENCE.length)); }
function prev(){ if(pos<=0) return; show(pos-1); }
function revealAnswer(){
  const item = SEQUENCE[pos];
  if(item && item.type==='question'){ show(pos+1); }
}

function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>toastEl.classList.remove('show'), 1400);
}

function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen?.().catch(()=>{});
  }else{
    document.exitFullscreen?.();
  }
}

document.addEventListener('keydown', (e)=>{
  switch(e.key){
    case ' ': case 'Spacebar':
      e.preventDefault();
      if(pos>=0) { togglePause(); toast(paused?'Paused':'Resumed'); }
      break;
    case 'ArrowRight': e.preventDefault(); next(); break;
    case 'ArrowLeft':  e.preventDefault(); prev(); break;
    case 'a': case 'A': revealAnswer(); break;
    case 'f': case 'F': toggleFullscreen(); break;
    case 'r': case 'R': restart(); break;
  }
});

/* Tap / click the stage to advance (handy on a touch screen) */
stage.addEventListener('click', (e)=>{
  if(e.target.closest('#startbtn')) return;
  if(pos>=0 && !paused) next();
});

/* ---------- Boot ---------- */
renderTitle();
if(CONFIG.titleAutostart>0){ setTimeout(start, CONFIG.titleAutostart*1000); }
</script>
</body>
</html>
