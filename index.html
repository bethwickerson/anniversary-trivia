<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Peter &amp; Marilyn Wickerson · 60th Anniversary Trivia</title>
<style>
  :root{
    --bg:#0d2438;
    --bg2:#123a54;
    --gold:#e8c477;
    --gold-soft:#f3e2b8;
    --cream:#fdf6e8;
    --ink:#0b1c2c;
    --sixties:#ff8f6b;   /* coral */
    --baseball:#7fd68a;  /* green */
    --greek:#8ec7ff;     /* blue */
    --y1966:#f2a7c3;     /* rose */
    --photo:#e8c477;     /* gold */
    --shadow:rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Georgia","Times New Roman",serif;
    background:radial-gradient(circle at 50% 20%, var(--bg2), var(--bg) 70%);
    color:var(--cream);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #stage{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:min(6vh,64px) min(6vw,80px);
  }

  /* ---- decorative frame ---- */
  #stage::before{
    content:"";
    position:fixed;
    inset:min(2.5vh,22px) min(2.5vw,22px);
    border:2px solid rgba(232,196,119,.35);
    border-radius:18px;
    pointer-events:none;
  }

  .card{
    width:100%;
    max-width:1400px;
    text-align:center;
    animation:fade .6s ease both;
  }
  @keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* ---- top bar ---- */
  #topbar{
    position:fixed;
    top:min(4vh,34px);
    left:0;right:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 min(6vw,80px);
    font-size:clamp(13px,1.5vw,20px);
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--gold);
    z-index:5;
    pointer-events:none;
  }
  #topbar .names{font-variant:small-caps;letter-spacing:.2em}
  #progress-wrap{
    position:fixed;top:min(1.8vh,14px);left:0;right:0;
    display:flex;justify-content:center;gap:0;z-index:5;pointer-events:none;
  }
  #progress{
    height:6px;width:min(60vw,760px);
    background:rgba(255,255,255,.12);
    border-radius:99px;overflow:hidden;
  }
  #progress-fill{height:100%;width:0;background:var(--gold);border-radius:99px}

  /* ---- category badge ---- */
  .badge{
    display:inline-block;
    padding:.5em 1.4em;
    border-radius:99px;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-weight:700;
    font-size:clamp(14px,1.7vw,24px);
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--ink);
    margin-bottom:clamp(20px,3.4vh,46px);
    box-shadow:0 8px 26px var(--shadow);
  }
  .badge.sixties{background:var(--sixties)}
  .badge.baseball{background:var(--baseball)}
  .badge.greek{background:var(--greek)}
  .badge.y1966{background:var(--y1966)}

  .qnum{
    display:block;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:clamp(12px,1.4vw,18px);
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--gold);
    opacity:.85;
    margin-bottom:clamp(14px,2.2vh,26px);
  }

  .question{
    font-size:clamp(30px,5.2vw,74px);
    line-height:1.18;
    font-weight:700;
    text-shadow:0 3px 18px var(--shadow);
  }

  .answer-label{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:clamp(14px,1.7vw,24px);
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:clamp(16px,2.6vh,30px);
  }
  .answer{
    font-size:clamp(34px,6vw,88px);
    line-height:1.14;
    font-weight:700;
    color:var(--gold-soft);
    text-shadow:0 3px 22px var(--shadow);
  }
  .fact{
    margin-top:clamp(20px,3.4vh,42px);
    font-size:clamp(18px,2.3vw,32px);
    line-height:1.4;
    font-style:italic;
    color:var(--cream);
    opacity:.9;
    max-width:26em;
    margin-left:auto;margin-right:auto;
  }

  /* ---- think timer ring ---- */
  #think{
    margin-top:clamp(28px,5vh,64px);
    display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .ring{transform:rotate(-90deg)}
  .ring .track{stroke:rgba(255,255,255,.14)}
  .ring .bar{stroke:var(--gold);stroke-linecap:round;transition:stroke-dashoffset .25s linear}
  #think .hint{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:clamp(13px,1.6vw,20px);
    letter-spacing:.14em;text-transform:uppercase;color:var(--gold);opacity:.85;
  }

  /* ---- photo slide ---- */
  .photo-card{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(16px,3vh,34px)}
  .photo-frame{
    background:var(--cream);
    padding:clamp(10px,1.4vw,20px);
    border-radius:6px;
    box-shadow:0 24px 60px var(--shadow);
    max-width:min(84vw,1200px);
    max-height:64vh;
    transform:rotate(-1.2deg);
  }
  .photo-frame img{
    display:block;
    max-width:100%;
    max-height:58vh;
    border-radius:2px;
    object-fit:contain;
  }
  .photo-caption{
    font-style:italic;
    font-size:clamp(20px,2.6vw,38px);
    color:var(--gold-soft);
    text-shadow:0 2px 14px var(--shadow);
  }
  .photo-placeholder{
    width:min(70vw,900px);height:48vh;
    display:flex;align-items:center;justify-content:center;text-align:center;
    background:repeating-linear-gradient(45deg,rgba(255,255,255,.05),rgba(255,255,255,.05) 18px,rgba(255,255,255,.09) 18px,rgba(255,255,255,.09) 36px);
    border:2px dashed rgba(232,196,119,.5);border-radius:8px;
    color:var(--gold);font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:clamp(16px,2vw,26px);letter-spacing:.05em;padding:2em;
  }

  /* ---- title & end screens ---- */
  .hero .kicker{
    font-family:"Helvetica Neue",Arial,sans-serif;
    letter-spacing:.4em;text-transform:uppercase;color:var(--gold);
    font-size:clamp(14px,1.8vw,24px);margin-bottom:clamp(18px,3vh,34px);
  }
  .hero h1{
    font-size:clamp(42px,7.5vw,120px);line-height:1.02;font-weight:700;
    text-shadow:0 4px 26px var(--shadow);
  }
  .hero .amp{color:var(--gold);font-style:italic}
  .hero .sub{
    margin-top:clamp(20px,3.4vh,40px);
    font-size:clamp(20px,2.8vw,40px);font-style:italic;color:var(--gold-soft);
  }
  .hero .years{
    margin-top:clamp(24px,4vh,52px);
    font-family:"Helvetica Neue",Arial,sans-serif;font-weight:700;
    font-size:clamp(56px,11vw,180px);color:var(--gold);
    letter-spacing:.02em;line-height:1;text-shadow:0 6px 30px var(--shadow);
  }
  .startbtn{
    margin-top:clamp(30px,5vh,60px);
    display:inline-block;cursor:pointer;
    font-family:"Helvetica Neue",Arial,sans-serif;font-weight:700;
    font-size:clamp(18px,2.2vw,30px);letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink);background:var(--gold);
    border:none;border-radius:99px;padding:.7em 2.4em;
    box-shadow:0 12px 30px var(--shadow);transition:transform .15s ease,box-shadow .15s ease;
  }
  .startbtn:hover{transform:translateY(-2px);box-shadow:0 16px 40px var(--shadow)}
  .controls-hint{
    margin-top:clamp(26px,4vh,44px);
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:clamp(12px,1.4vw,17px);letter-spacing:.06em;color:var(--cream);opacity:.7;
    line-height:1.9;
  }
  .controls-hint kbd{
    background:rgba(255,255,255,.14);border-radius:5px;padding:.15em .55em;
    font-family:inherit;border:1px solid rgba(255,255,255,.18);
  }

  /* ---- pause overlay ---- */
  #pause{
    position:fixed;inset:0;z-index:20;display:none;
    align-items:center;justify-content:center;
    background:rgba(9,22,36,.72);backdrop-filter:blur(3px);
    font-family:"Helvetica Neue",Arial,sans-serif;
    letter-spacing:.2em;text-transform:uppercase;color:var(--gold);
    font-size:clamp(22px,3.4vw,52px);
  }
  body.paused #pause{display:flex}

  #toast{
    position:fixed;bottom:min(9vh,90px);left:50%;transform:translateX(-50%);
    background:rgba(9,22,36,.9);border:1px solid rgba(232,196,119,.4);
    color:var(--cream);font-family:"Helvetica Neue",Arial,sans-serif;
    padding:.6em 1.3em;border-radius:99px;font-size:clamp(12px,1.4vw,18px);
    letter-spacing:.08em;opacity:0;transition:opacity .3s ease;z-index:30;pointer-events:none;
  }
  #toast.show{opacity:1}

  /* ---- on-screen controls (great for tapping on a phone) ---- */
  #controls{
    position:fixed;bottom:min(4vh,30px);left:50%;transform:translateX(-50%);
    display:none;gap:clamp(14px,2vw,24px);z-index:15;
  }
  body.playing #controls{display:flex}
  #controls button{
    -webkit-appearance:none;appearance:none;
    width:clamp(52px,6.5vw,68px);height:clamp(52px,6.5vw,68px);
    border-radius:50%;border:1.5px solid rgba(232,196,119,.55);
    background:rgba(9,22,36,.55);color:var(--gold);
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:clamp(20px,2.6vw,28px);line-height:1;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(4px);transition:transform .12s ease,background .12s ease;
  }
  #controls button:hover{background:rgba(232,196,119,.18)}
  #controls button:active{transform:scale(.92)}
  #controls button:focus-visible{outline:3px solid var(--cream);outline-offset:2px}

  .startrow{display:flex;gap:clamp(12px,2vw,20px);flex-wrap:wrap;justify-content:center;margin-top:clamp(30px,5vh,60px)}
  .startrow .startbtn{margin-top:0}
  .startbtn.ghost{background:transparent;color:var(--gold);border:2px solid var(--gold);box-shadow:none}
  .startbtn.ghost:hover{background:rgba(232,196,119,.12)}
  .tap-hint{margin-top:clamp(26px,4.6vh,56px);font-family:"Helvetica Neue",Arial,sans-serif;font-size:clamp(14px,1.7vw,22px);letter-spacing:.14em;text-transform:uppercase;color:var(--gold);opacity:.8}

  .hidden{display:none!important}
</style>
</head>
<body>

  <div id="topbar" class="hidden">
    <span class="names">Peter &amp; Marilyn · 60 Years</span>
    <span id="counter"></span>
  </div>

  <div id="stage"><!-- slides render here --></div>

  <div id="progress-wrap" class="hidden"><div id="progress"><div id="progress-fill"></div></div></div>

  <div id="pause">Paused &middot; press Space to resume</div>
  <div id="toast"></div>

  <div id="controls">
    <button id="cprev" aria-label="Back">&larr;</button>
    <button id="cpause" aria-label="Pause or resume">&#10074;&#10074;</button>
    <button id="cnext" aria-label="Next">&rarr;</button>
  </div>

<script src="photos.js"></script>
<script>
/* ============================================================
   Peter & Marilyn Wickerson · 60th Anniversary Trivia
   Self-contained, auto-playing, projector-friendly.
   ============================================================ */

const CONFIG = {
  thinkSeconds:  20,   // time to think about each question
  answerSeconds:  9,   // time the answer stays on screen
  photoSeconds:   8,   // time each family photo stays on screen
  titleAutostart: 0,   // 0 = wait for Start click; >0 = auto-start after N seconds
};

/* ---- Questions ------------------------------------------------
   category: 'sixties' | 'baseball' | 'greek'
   fact is optional colour for the answer screen.
----------------------------------------------------------------*/
const QUESTIONS = [
  // All 1966 questions, mixed together; they play in this order.
  {c:'y1966', q:"In 1966 Peter and Marilyn were married. That same summer England won the World Cup, beating which country in the final?", a:"West Germany", f:"England won 4 to 2 at Wembley."},
  {c:'y1966', q:"Who was Canada's prime minister in 1966?", a:"Lester B. Pearson"},
  {c:'y1966', q:"Who was the U.S. president in 1966?", a:"Lyndon B. Johnson"},
  {c:'y1966', q:"Which sci-fi TV series first aired in September 1966?", a:"Star Trek"},
  {c:'y1966', q:"Which party game, played on a mat of big coloured dots, was released in 1966?", a:"Twister"},
  {c:'y1966', q:"Which triangular corn-chip snack was first sold right across North America in 1966?", a:"Doritos", f:"They were dreamed up at Disneyland's Casa de Fritos."},
  {c:'y1966', q:"Which film won the Academy Award for Best Picture for 1966?", a:"A Man for All Seasons"},
  {c:'baseball', q:"Which Los Angeles team did the Baltimore Orioles sweep to win the 1966 World Series?", a:"The Dodgers", f:"The Orioles won in four straight games."},
  {c:'y1966', q:"Roughly what did an average London, Ontario home cost in 1966?", a:"About $16,000", f:"Mid-sized Ontario cities ran well below Toronto prices."},
  {c:'y1966', q:"Roughly what was the average Canadian family's income in 1966?", a:"About $6,700 a year", f:"A little higher here in Ontario than the national average."},
  {c:'y1966', q:"Which Canadian team won the Stanley Cup in 1966?", a:"The Montreal Canadiens"},
  {c:'y1966', q:"About how many people lived in Canada in 1966?", a:"About 20 million"},
  {c:'y1966', q:"Which knee-high, flat-heeled boot became a 1966 fashion craze?", a:"Go-go boots"},
  {c:'y1966', q:"Which Beatles album, featuring \"Eleanor Rigby\" and \"Yellow Submarine\", came out in 1966?", a:"Revolver"},
  {c:'y1966', q:"Which campy superhero TV series, starring Adam West, first aired in 1966?", a:"Batman", f:"Holy anniversary, Batman!"},
  {c:'baseball', q:"How many Major League Baseball teams were based in Canada in 1966?", a:"None (zero)", f:"Montreal's Expos didn't arrive until 1969."},
  {c:'y1966', q:"Which national program, still on every Canadian's paycheque today, began on January 1, 1966?", a:"The Canada Pension Plan (CPP)"},
  {c:'y1966', q:"In 1966 unmanned spacecraft made the first gentle (\"soft\") landings on which world?", a:"The Moon", f:"The Soviet Luna 9 touched down in February 1966."},
  {c:'y1966', q:"By 1966, ocean-floor evidence had convinced scientists that Earth's continents slowly drift. What is this theory called?", a:"Plate tectonics (continental drift)", f:"The sea floor was found to spread, slowly pushing the continents apart."},
  {c:'y1966', q:"On July 8, 1966, the McMichael Canadian Art Collection opened its doors to the public. In which Canadian province?", a:"Ontario", f:"In Kleinburg, north of Toronto, it became a premier home for the Group of Seven's paintings."},
];

const CAT_LABEL = {
  y1966:    "The World in 1966",
  baseball: "Take Me Out to the Ball Game",
};

/* ---- Photos --------------------------------------------------
   window.PHOTOS is defined in photos.js as an array of
   { file, caption }.  One photo is shown after each question.
   A photo that isn't in the photos/ folder is simply skipped.
----------------------------------------------------------------*/
const PHOTOS = (window.PHOTOS && window.PHOTOS.length) ? window.PHOTOS : [];

/* ---- Build the play sequence ---------------------------------
   Interleave family photos evenly between the Q&A pairs so the
   whole set of photos is spread across the game.
----------------------------------------------------------------*/
function buildSequence(){
  const seq = [];
  const nQ = QUESTIONS.length;
  // Show ONE family photo after each question (when one is listed for
  // that slot). Photo i follows question i, so list them in the order
  // you'd like them to appear. Extra photos beyond the number of
  // questions are not shown.
  for(let i=0;i<nQ;i++){
    seq.push({type:'question', data:QUESTIONS[i], index:i});
    seq.push({type:'answer',   data:QUESTIONS[i], index:i});
    if(i < PHOTOS.length){
      seq.push({type:'photo', data:PHOTOS[i], index:i});
    }
  }
  return seq;
}

/* ============================================================
   Player engine
   ============================================================ */
const stage      = document.getElementById('stage');
const topbar     = document.getElementById('topbar');
const counterEl  = document.getElementById('counter');
const progWrap   = document.getElementById('progress-wrap');
const progFill   = document.getElementById('progress-fill');
const toastEl    = document.getElementById('toast');
const cprev      = document.getElementById('cprev');
const cpause     = document.getElementById('cpause');
const cnext      = document.getElementById('cnext');

let SEQUENCE = [];
let pos = -1;            // index into SEQUENCE (-1 = title)
let mode = 'auto';       // 'auto' = timed; 'manual' = tap to advance
let paused = false;
let lastDir = 1;         // direction of travel: 1 = forward, -1 = back
let timer = null;        // setTimeout handle for auto-advance
let ringRAF = null;      // requestAnimationFrame for countdown ring
let slotStart = 0;       // when current slot began (performance.now)
let slotDuration = 0;    // ms for current slot
let slotRemaining = 0;   // ms left when paused

const totalQuestions = QUESTIONS.length;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ---------- Screen renderers ---------- */
function renderTitle(){
  topbar.classList.add('hidden');
  progWrap.classList.add('hidden');
  stage.innerHTML = `
    <div class="card hero">
      <div class="kicker">A Family Celebration</div>
      <h1>Peter <span class="amp">&amp;</span> Marilyn<br>Wickerson</h1>
      <div class="years">60</div>
      <div class="sub">Years of Marriage &middot; 1966 to 2026</div>
      <div class="startrow">
        <button class="startbtn" id="startAuto">Play automatically</button>
        <button class="startbtn ghost" id="startManual">I&rsquo;ll tap to advance</button>
      </div>
      <div class="controls-hint">
        Tap the screen or the <kbd>&rarr;</kbd> button to advance &nbsp; <kbd>&larr;</kbd> back &nbsp; <kbd>Space</kbd> pause &nbsp; <kbd>F</kbd> full screen &nbsp; <kbd>R</kbd> restart
      </div>
    </div>`;
  document.getElementById('startAuto').addEventListener('click', ()=>start('auto'));
  document.getElementById('startManual').addEventListener('click', ()=>start('manual'));
}

function renderQuestion(item){
  topbar.classList.remove('hidden');
  progWrap.classList.remove('hidden');
  const {q} = item.data;
  counterEl.textContent = `Question ${item.index+1} of ${totalQuestions}`;
  const thinkBlock = (mode==='auto')
    ? `<div id="think">
        <svg class="ring" width="110" height="110" viewBox="0 0 110 110">
          <circle class="track" cx="55" cy="55" r="48" fill="none" stroke-width="8"/>
          <circle class="bar"   cx="55" cy="55" r="48" fill="none" stroke-width="8"
                  stroke-dasharray="301.6" stroke-dashoffset="0" id="ringbar"/>
        </svg>
        <div class="hint">Think&hellip;</div>
      </div>`
    : `<div class="tap-hint">Tap for the answer &rsaquo;</div>`;
  stage.innerHTML = `
    <div class="card">
      <span class="qnum">Question ${item.index+1}</span>
      <div class="question">${esc(q)}</div>
      ${thinkBlock}
    </div>`;
  if(mode==='auto') startRing(CONFIG.thinkSeconds*1000);
}

function renderAnswer(item){
  const {a,f} = item.data;
  counterEl.textContent = `Question ${item.index+1} of ${totalQuestions}`;
  stage.innerHTML = `
    <div class="card">
      <div class="answer-label">The Answer</div>
      <div class="answer">${esc(a)}</div>
      ${f ? `<div class="fact">${esc(f)}</div>` : ``}
      ${mode==='manual' ? `<div class="tap-hint">Tap for the next &rsaquo;</div>` : ``}
    </div>`;
}

/* The photo file to show. Photos live locally in the photos/ folder
   next to index.html, so it all runs offline with nothing to break. */
function photoSources(d){
  if(d.src)  return [d.src];
  if(d.file) return ['photos/' + d.file];
  return [];
}

function renderPhoto(item){
  topbar.classList.remove('hidden');
  const d = item.data;
  const caption = d.caption || '';
  const srcs = photoSources(d);
  counterEl.textContent = `A Family Memory`;
  const cap = caption ? `<div class="photo-caption">${esc(caption)}</div>` : '';
  stage.innerHTML = `
    <div class="card photo-card">
      <div class="photo-frame">
        <img id="pimg" alt="${esc(caption||'Wickerson family photo')}">
      </div>
      ${cap}
    </div>`;
  const img = document.getElementById('pimg');
  if(!srcs.length){ onPhotoFail(item); return; }
  let tryIdx = 0;
  img.onerror = () => {
    tryIdx++;
    if(tryIdx < srcs.length){ img.src = encodeURI(srcs[tryIdx]); }
    else { onPhotoFail(item); }
  };
  img.src = encodeURI(srcs[0]);
}

/* A photo couldn't be loaded: skip it in the direction we're travelling
   so it keeps flowing forward, but skips backward when you pressed Back
   (otherwise Back would bounce you straight off the empty photo again). */
function onPhotoFail(){
  if(paused) return;
  const target = pos + lastDir;
  if(target < 0) return;        // nothing before the first slide
  show(target);
}

function renderPlaceholderPhoto(n){
  topbar.classList.remove('hidden');
  counterEl.textContent = `A Family Memory`;
  stage.innerHTML = `
    <div class="card photo-card">
      <div class="photo-placeholder">
        Family photo #${n}<br><br>
        <small>Add photos in <b>photos.js</b> and they'll appear here between questions.</small>
      </div>
    </div>`;
}

function renderEnd(){
  topbar.classList.add('hidden');
  progWrap.classList.add('hidden');
  stage.innerHTML = `
    <div class="card hero">
      <div class="kicker">Thank you for playing</div>
      <h1>Happy 60<span class="amp">th</span><br>Anniversary!</h1>
      <div class="sub">Peter &amp; Marilyn Wickerson &middot; 1966 to 2026</div>
      <div class="controls-hint">Press <kbd>R</kbd> to play again</div>
    </div>`;
}

/* ---------- Countdown ring ---------- */
function startRing(ms){
  const bar = document.getElementById('ringbar');
  if(!bar) return;
  const circ = 2*Math.PI*48; // 301.6
  cancelAnimationFrame(ringRAF);
  const begin = performance.now();
  function frame(now){
    const elapsed = now - begin;
    const pct = Math.min(1, elapsed/ms);
    bar.style.strokeDashoffset = (circ*pct).toFixed(1);
    if(pct<1 && !paused) ringRAF = requestAnimationFrame(frame);
  }
  ringRAF = requestAnimationFrame(frame);
}

/* ---------- Sequencing ---------- */
function show(i){
  clearTimeout(timer);
  cancelAnimationFrame(ringRAF);
  pos = i;

  if(pos >= SEQUENCE.length){ renderEnd(); return; }

  const item = SEQUENCE[pos];
  let dur;
  if(item.type==='question'){ renderQuestion(item); dur = CONFIG.thinkSeconds*1000; }
  else if(item.type==='answer'){ renderAnswer(item); dur = CONFIG.answerSeconds*1000; }
  else { renderPhoto(item); dur = CONFIG.photoSeconds*1000; }

  updateProgress();
  if(mode==='auto') scheduleAdvance(dur);
  else clearTimeout(timer);   // manual: wait for a tap
}

function scheduleAdvance(ms){
  slotDuration = ms;
  slotRemaining = ms;
  slotStart = performance.now();
  clearTimeout(timer);
  if(!paused){
    timer = setTimeout(()=>{ lastDir=1; show(pos+1); }, ms);
  }
}

function updateProgress(){
  // progress based on how many questions have been reached
  const item = SEQUENCE[pos];
  let qDone = 0;
  for(let k=0;k<=pos;k++){ if(SEQUENCE[k] && SEQUENCE[k].type==='answer') qDone++; }
  progFill.style.width = (qDone/totalQuestions*100).toFixed(1)+'%';
}

/* ---------- Controls ---------- */
function start(m){
  mode = (m==='manual') ? 'manual' : 'auto';
  document.body.classList.add('playing');
  cpause.style.display = (mode==='auto') ? '' : 'none';
  cpause.innerHTML = '&#10074;&#10074;';
  SEQUENCE = buildSequence();
  show(0);
}
function restart(){ pos=-1; paused=false; document.body.classList.remove('paused','playing'); renderTitle(); }

function togglePause(){
  if(mode!=='auto') return;   // manual mode has no timer to pause
  paused = !paused;
  document.body.classList.toggle('paused', paused);
  cpause.innerHTML = paused ? '&#9654;' : '&#10074;&#10074;';
  if(paused){
    clearTimeout(timer);
    cancelAnimationFrame(ringRAF);
    slotRemaining = slotDuration - (performance.now()-slotStart);
  }else{
    // resume
    slotStart = performance.now();
    slotDuration = Math.max(0, slotRemaining);
    timer = setTimeout(()=>{ lastDir=1; show(pos+1); }, slotDuration);
    // resume the ring if on a question
    const item = SEQUENCE[pos];
    if(item && item.type==='question'){
      startRing(slotRemaining);
    }
  }
}

function next(){ if(pos<0){start();return;} lastDir=1; show(Math.min(pos+1, SEQUENCE.length)); }
function prev(){ if(pos<=0) return; lastDir=-1; show(pos-1); }
function revealAnswer(){
  const item = SEQUENCE[pos];
  if(item && item.type==='question'){ lastDir=1; show(pos+1); }
}

function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>toastEl.classList.remove('show'), 1400);
}

function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen?.().catch(()=>{});
  }else{
    document.exitFullscreen?.();
  }
}

document.addEventListener('keydown', (e)=>{
  switch(e.key){
    case ' ': case 'Spacebar':
      e.preventDefault();
      if(pos>=0) { togglePause(); toast(paused?'Paused':'Resumed'); }
      break;
    case 'ArrowRight': e.preventDefault(); next(); break;
    case 'ArrowLeft':  e.preventDefault(); prev(); break;
    case 'a': case 'A': revealAnswer(); break;
    case 'f': case 'F': toggleFullscreen(); break;
    case 'r': case 'R': restart(); break;
  }
});

/* Tap / click the stage to advance (handy on a phone or touch screen) */
stage.addEventListener('click', (e)=>{
  if(e.target.closest('.startbtn')) return;   // let the start buttons do their thing
  if(pos>=0 && !paused) next();
});

/* On-screen control buttons */
cprev.addEventListener('click', prev);
cnext.addEventListener('click', next);
cpause.addEventListener('click', ()=>{ if(pos>=0) togglePause(); });

/* ---------- Boot ---------- */
renderTitle();
if(CONFIG.titleAutostart>0){ setTimeout(start, CONFIG.titleAutostart*1000); }
</script>
</body>
</html>
